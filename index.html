<!DOCTYPE html>
<html>
<head>
    <title>Node-Based AR Navigation</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
        .hud {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 999;
            font-family: sans-serif;
            pointer-events: none;
        }
        .instruction-box {
            background: rgba(0, 0, 0, 0.85);
            color: #00ff00; 
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 1.2rem;
            display: inline-block;
            border: 2px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
            max-width: 80%; /* Keeps long text inside screen */
        }
        .sub-text {
            display: block;
            font-size: 1rem;
            color: #fff;
            margin-top: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body style='margin: 0; overflow: hidden;'>

    <div class="hud">
        <div class="instruction-box" id="msg">
            Initializing System...
            <span class="sub-text">Connecting to Satellites</span>
        </div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs='sourceType: webcam; videoTexture: true; debugUIEnabled: false;'>

        <a-camera gps-camera="gpsMinDistance: 3" rotation-reader id="camera">
            
            <a-entity 
                id="guide-arrow"
                visible="false"
                geometry="primitive: cone; radiusBottom: 0.15; height: 0.5"
                material="color: #ff0000; opacity: 1.0; shader: flat;"
                position="0 -0.5 -1.5"
                rotation="90 0 0"> 
            </a-entity>

        </a-camera>

    </a-scene>

    <script>
        // ============================================
        // ⚠️ PASTE YOUR MAPBOX TOKEN HERE
        // ============================================
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiaGVtYW50aDg1MDMiLCJhIjoiY21rNzV5c2w2MHlqeTNncjI5bjkyeWJwaiJ9.NnunzAB_24Ntn83H5hRcyQ'; 

        // ============================================
        // ⚠️ SET DESTINATION [Longitude, Latitude]
        // ============================================
        const DESTINATION = [79.1559, 12.9692]; // VIT Main Gate

        // ============================================
        // NODE LOGIC VARIABLES
        // ============================================
        let turnNodes = [];
        let turnInstructions = [];
        let currentNodeIndex = 0;
        const NODE_RADIUS = 15; // In meters: How close until it snaps to the next turn?

        window.onload = () => {
            const msgBox = document.querySelector('#msg');
            const arrow = document.querySelector('#guide-arrow');
            const camera = document.querySelector('#camera');

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(async (position) => {
                    const userLat = position.coords.latitude;
                    const userLon = position.coords.longitude;

                    // 1. Fetch Nodes on first run
                    if (turnNodes.length === 0) {
                        msgBox.innerHTML = "Mapping Route...<br><span class='sub-text'>Extracting Turn Nodes</span>";
                        await getPathFromMapbox(userLon, userLat);
                    }

                    // 2. Navigation Loop
                    if (turnNodes.length > 0) {
                        const targetNode = turnNodes[currentNodeIndex];
                        const instructionText = turnInstructions[currentNodeIndex];
                        
                        // Calculate distance to the exact Turn Node
                        const dist = calculateDistance(userLat, userLon, targetNode[1], targetNode[0]);

                        // Update Screen Text with actual directions
                        msgBox.innerHTML = `${instructionText}<br><span class='sub-text'>${Math.round(dist)} meters ahead</span>`;
                        arrow.setAttribute('visible', 'true');

                        // 3. Node Radius Check
                        if (dist < NODE_RADIUS) {
                            if (currentNodeIndex < turnNodes.length - 1) {
                                // Jump to next node!
                                currentNodeIndex++;
                                // Optional vibrate if phone supports it
                                if("vibrate" in navigator) navigator.vibrate(200); 
                            } else {
                                msgBox.innerHTML = "🎉 YOU HAVE ARRIVED! 🎉<br><span class='sub-text'>Destination Reached</span>";
                                arrow.setAttribute('visible', 'false');
                            }
                        }

                        // 4. Arrow Pointing Logic
                        const targetBearing = calculateBearing(userLat, userLon, targetNode[1], targetNode[0]);
                        const currentRotation = camera.getAttribute('rotation');
                        const userHeading = currentRotation ? currentRotation.y : 0;
                        const relativeHeading = targetBearing - userHeading;

                        arrow.object3D.rotation.y = THREE.Math.degToRad(-relativeHeading);
                        arrow.object3D.rotation.x = THREE.Math.degToRad(90); 
                    }

                }, (err) => {
                    console.error(err);
                    msgBox.innerHTML = "GPS Error<br><span class='sub-text'>Please enable Location</span>";
                }, { enableHighAccuracy: true });
            }
        };

        // --- MAPBOX NODE EXTRACTION ---
        async function getPathFromMapbox(startLon, startLat) {
            const url = `https://api.mapbox.com/directions/v5/mapbox/walking/${startLon},${startLat};${DESTINATION[0]},${DESTINATION[1]}?steps=true&geometries=geojson&access_token=${MAPBOX_TOKEN}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.routes && data.routes.length > 0) {
                    // Extract the "Steps" (The Nodes) instead of the raw geometry line
                    const steps = data.routes[0].legs[0].steps;
                    
                    // Map the coordinates and text instructions to our arrays
                    turnNodes = steps.map(step => step.maneuver.location);
                    turnInstructions = steps.map(step => step.maneuver.instruction);
                    
                    console.log("Extracted Nodes:", turnNodes.length);
                } else {
                    document.querySelector('#msg').innerHTML = "No Route Found!<br><span class='sub-text'>Check coordinates</span>";
                }
            } catch (error) { console.error(error); }
        }

        // --- MATH HELPERS ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin(lon2 - lon1) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
